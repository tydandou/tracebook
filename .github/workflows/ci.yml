name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ['3.10', '3.13']
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Run tests
        run: python -B -m unittest discover -s tests -v
      - name: Validate Skill package
        run: python plugins/tracebook/skills/tracebook/scripts/validate_skill_package.py
      - name: Compile Python sources
        run: python -m compileall -q plugins/tracebook/skills/tracebook/scripts tests
      - name: Check pull request whitespace
        if: github.event_name == 'pull_request'
        shell: bash
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          base="$BASE_SHA"
          head="$HEAD_SHA"
          git diff --check "$base" "$head"
      - name: Check pushed whitespace
        if: github.event_name == 'push'
        shell: bash
        env:
          BASE_SHA: ${{ github.event.before }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          base="$BASE_SHA"
          head="$HEAD_SHA"
          if [[ "$base" =~ ^0+$ ]] || ! git cat-file -e "$base^{object}" 2>/dev/null; then
            base="$(git hash-object -t tree /dev/null)"
          fi
          git diff --check "$base" "$head"
